<!DOCTYPE html>
<html>
<head>
<title>Appointment Summary</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7f9;
margin:0;
padding:20px;
}

.card{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0b6b4a;
}

.info{
background:#f8f8f8;
padding:15px;
border-radius:12px;
margin:10px 0;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

.apply-btn{
width:100%;
padding:12px;
margin-top:10px;
background:#0b6b4a;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

.pay-btn{
display:block;
text-align:center;
background:#2196f3;
color:white;
text-decoration:none;
padding:14px;
border-radius:10px;
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.amount{
text-align:center;
margin-top:15px;
}

.saved{
color:green;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<div class="card">

<h1>📋 Appointment Summary</h1>

<div class="info">
<label>Doctor</label>
<p>Dr. P. K. Srivastava</p>
</div>

<div class="info">
<label>Date</label>
<p>15 June 2026</p>
</div>

<div class="info">
<label>Slot</label>
<p>10:30 AM - 11:00 AM</p>
</div>

<hr>

<h3>🎁 Apply Coupon</h3>

<input id="coupon" placeholder="Enter Coupon Code">

<button class="apply-btn" onclick="applyCoupon()">
Apply Coupon
</button>

<p id="saved" class="saved"></p>

<div class="amount">
<h2 id="amount">
Consultation Fee ₹199
</h2>
</div>

<a href="payment.html" class="pay-btn">
Proceed To Payment
</a>

</div>

<script>
function applyCoupon(){

let code =
document.getElementById("coupon").value;

if(code==="WELCOME50"){

document.getElementById("saved")
.innerHTML="🎉 You Saved ₹50";

document.getElementById("amount")
.innerHTML="Final Amount ₹149";

}else{

document.getElementById("saved")
.innerHTML="❌ Invalid Coupon";

}

}
</script>

</body>
</html>
